<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free online Pomodoro timer with customizable work/break durations. Supports Korean, English, and Chinese. Boost your productivity with cute animations!">
<meta name="keywords" content="pomodoro timer, focus timer, productivity, work break timer, online timer, free pomodoro, 뽀모도로 타이머, 番茄钟, 专注计时器">
<meta property="og:title" content="Pomodoro Timer - Focus &amp; Break">
<meta property="og:description" content="Free customizable Pomodoro timer in 3 languages. 50min work + 10min break by default. Cute &amp; productive!">
<meta property="og:type" content="website">
<meta name="robots" content="index, follow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
<title>Pomodoro Timer - Free Online Focus Timer | 뽀모도로 타이머 | 番茄钟</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap');

  :root {
    --bg: #fff5f7;
    --surface: #ffffff;
    --work: oklch(0.62 0.19 6);
    --work-light: oklch(0.88 0.056 6);
    --rest: oklch(0.62 0.15 215);
    --rest-light: oklch(0.88 0.045 215);
    --text: oklch(0.32 0.02 6);
    --sub: oklch(0.52 0.03 6);
    --ring-bg: oklch(0.92 0.02 6);
    --radius: 24px;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, 'Segoe UI', 'Nunito', 'Noto Sans KR', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 80%, oklch(0.88 0.056 6 / 0.35) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, oklch(0.88 0.045 215 / 0.30) 0%, transparent 50%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    user-select: none;
  }

  .container {
    background: oklch(1 0 0 / 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: clamp(28px, 4vmin, 48px);
    padding: clamp(28px, 5vmin, 56px) clamp(24px, 4vmin, 48px);
    width: clamp(320px, 60vmin, 720px);
    max-width: 94vw;
    box-shadow:
      0 1px 2px oklch(0 0 0 / 0.04),
      0 4px 16px oklch(0 0 0 / 0.06),
      0 16px 48px oklch(0 0 0 / 0.08);
    text-align: center;
    position: relative;
  }

  /* 언어 선택기 */
  .lang-switcher {
    position: absolute;
    top: clamp(12px, 2vmin, 24px);
    right: clamp(14px, 2.5vmin, 28px);
    display: flex;
    gap: 4px;
  }

  .lang-btn {
    background: none;
    border: 1.5px solid transparent;
    border-radius: clamp(8px, 1vmin, 12px);
    padding: clamp(4px, 0.7vmin, 8px) clamp(6px, 1vmin, 12px);
    font-size: clamp(11px, 1.4vmin, 14px);
    font-weight: 600;
    cursor: pointer;
    color: var(--sub);
    transition: all 0.2s;
    font-family: inherit;
  }

  .lang-btn:hover {
    background: var(--ring-bg);
    color: var(--text);
  }

  .lang-btn.active {
    background: var(--work-light);
    color: var(--work);
    border-color: var(--work);
  }

  /* 귀여운 캐릭터 */
  .mascot {
    font-size: clamp(48px, 9vmin, 90px);
    line-height: 1;
    margin-bottom: 8px;
    margin-top: 8px;
    animation: mascot-bounce 2.5s ease-in-out infinite;
  }

  @keyframes mascot-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .mascot.working { animation: mascot-work 1.2s ease-in-out infinite; }
  @keyframes mascot-work {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.05); }
  }

  .status-label {
    font-size: clamp(13px, 1.6vmin, 16px);
    font-weight: 500;
    color: var(--sub);
    letter-spacing: 0.5px;
    margin-bottom: clamp(18px, 2.5vmin, 28px);
    padding: clamp(6px, 0.9vmin, 10px) clamp(16px, 2vmin, 24px);
    border-radius: 20px;
    display: inline-block;
    transition: background var(--transition), color var(--transition);
  }

  .status-label.work {
    background: var(--work-light);
    color: var(--work);
  }

  .status-label.rest {
    background: var(--rest-light);
    color: var(--rest);
  }

  /* 타이머 링 */
  .timer-ring-wrapper {
    position: relative;
    width: clamp(180px, 40vmin, 380px);
    height: clamp(180px, 40vmin, 380px);
    margin: 0 auto clamp(16px, 3vmin, 32px);
  }

  .timer-ring {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .ring-bg {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 10;
  }

  .ring-progress {
    fill: none;
    stroke: var(--work);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke 0.5s ease, stroke-dashoffset 0.3s linear;
  }

  .ring-progress.rest-mode {
    stroke: var(--rest);
  }

  .timer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(40px, 9vmin, 72px);
    font-weight: 700;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
    transition: color var(--transition);
  }

  .timer-text.work { color: var(--work); }
  .timer-text.rest { color: var(--rest); }

  /* 컨트롤 버튼 */
  .controls {
    display: flex;
    gap: clamp(10px, 1.5vmin, 16px);
    justify-content: center;
    margin-bottom: clamp(24px, 4vmin, 40px);
  }

  .btn {
    width: clamp(44px, 7vmin, 72px);
    height: clamp(44px, 7vmin, 72px);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: clamp(20px, 3vmin, 28px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.2s;
    position: relative;
  }

  .btn:active { transform: scale(0.92); }

  .btn-play {
    background: var(--work);
    color: white;
    box-shadow: 0 4px 14px oklch(0.62 0.19 6 / 0.35);
    width: clamp(52px, 8vmin, 80px);
    height: clamp(52px, 8vmin, 80px);
    font-size: clamp(24px, 3.5vmin, 34px);
  }

  .btn-play.rest-mode {
    background: var(--rest);
    box-shadow: 0 4px 14px oklch(0.62 0.15 215 / 0.35);
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--sub);
    box-shadow: 0 2px 8px oklch(0 0 0 / 0.08);
  }

  .btn-secondary:hover { color: var(--text); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* 설정 영역 */
  .settings-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--sub);
    font-size: clamp(12px, 1.5vmin, 14px);
    font-weight: 500;
    padding: clamp(6px, 0.9vmin, 10px) clamp(14px, 2vmin, 20px);
    border-radius: 20px;
    transition: background 0.2s, color 0.2s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .settings-toggle:hover {
    background: oklch(0.92 0.02 6 / 0.5);
    color: var(--text);
  }

  .settings-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1), margin 0.45s;
    margin-top: 0;
  }

  .settings-panel.open {
    max-height: 320px;
    margin-top: clamp(14px, 2vmin, 24px);
  }

  .settings-panel:not(.open) input,
  .settings-panel:not(.open) select,
  .settings-panel:not(.open) button {
    visibility: hidden;
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 1.2vmin, 12px);
    margin-bottom: clamp(6px, 1vmin, 10px);
  }

  .settings-row:last-child { margin-bottom: 0; }

  .settings-label {
    font-size: clamp(12px, 1.5vmin, 15px);
    font-weight: 500;
    width: clamp(48px, 7vmin, 68px);
    text-align: right;
    flex-shrink: 0;
  }

  .time-input-group {
    display: flex;
    align-items: center;
    background: var(--bg);
    border-radius: clamp(12px, 2vmin, 18px);
    padding: clamp(3px, 0.5vmin, 5px);
    gap: 2px;
  }

  .time-input {
    width: clamp(40px, 6vmin, 56px);
    padding: clamp(4px, 0.8vmin, 8px) clamp(3px, 0.6vmin, 6px);
    border: none;
    background: var(--surface);
    border-radius: clamp(10px, 1.5vmin, 14px);
    text-align: center;
    font-size: clamp(14px, 1.8vmin, 17px);
    font-weight: 600;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: box-shadow 0.2s;
    user-select: auto;
  }

  .time-input:focus {
    box-shadow: 0 0 0 2px var(--work);
  }

  .time-sep {
    font-size: clamp(13px, 1.6vmin, 16px);
    font-weight: 600;
    color: var(--sub);
    padding: 0 2px;
  }

  .sound-select {
    padding: clamp(6px, 1.2vmin, 10px) clamp(8px, 1.4vmin, 14px);
    border: none;
    background: var(--surface);
    border-radius: clamp(10px, 1.5vmin, 14px);
    font-size: clamp(12px, 1.5vmin, 15px);
    font-weight: 600;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    outline: none;
    transition: box-shadow 0.2s;
    min-width: clamp(110px, 18vmin, 150px);
    user-select: auto;
  }

  .sound-select:focus {
    box-shadow: 0 0 0 2px var(--work);
  }

  .btn-apply {
    background: var(--text);
    color: white;
    border: none;
    padding: clamp(8px, 1.2vmin, 12px) clamp(14px, 2vmin, 22px);
    border-radius: clamp(12px, 1.5vmin, 16px);
    font-size: clamp(12px, 1.4vmin, 14px);
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-apply:active { transform: scale(0.96); }
  .btn-apply:hover { opacity: 0.85; }

  /* 세션 카운터 */
  .session-counter {
    margin-top: clamp(18px, 3vmin, 28px);
    display: flex;
    gap: clamp(8px, 1.2vmin, 12px);
    justify-content: center;
    flex-wrap: wrap;
  }

  .session-dot {
    width: clamp(10px, 1.5vmin, 14px);
    height: clamp(10px, 1.5vmin, 14px);
    border-radius: 50%;
    background: var(--ring-bg);
    transition: background 0.3s, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .session-dot.done {
    background: var(--work);
    transform: scale(1.15);
  }

  /* @media 쿼리 제거 — clamp()로 모든 화면 크기 대응 */

  /* 파티클 효과 */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    animation: particle-up 1.2s ease-out forwards;
    z-index: 100;
  }

  @keyframes particle-up {
    0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.3) rotate(40deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- 언어 선택기 -->
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="ko">한</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="zh">中</button>
  </div>

  <div class="mascot" id="mascot">🐣</div>

  <div class="status-label work" id="statusLabel">🍅 집중 타임</div>

  <div class="timer-ring-wrapper">
    <svg class="timer-ring" viewBox="0 0 240 240">
      <circle class="ring-bg" cx="120" cy="120" r="110"/>
      <circle class="ring-progress" id="ringProgress" cx="120" cy="120" r="110"
        stroke-dasharray="691.15" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text work" id="timerText">50:00</div>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" id="btnReset" title="리셋" aria-label="리셋" disabled>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:clamp(18px,2.5vmin,26px);height:clamp(18px,2.5vmin,26px);">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    </button>
    <button class="btn btn-play" id="btnPlay" title="시작" aria-label="시작">
      <svg id="iconPlay" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="width:clamp(22px,3vmin,34px);height:clamp(22px,3vmin,34px);">
        <polygon points="6,3 20,12 6,21"/>
      </svg>
      <svg id="iconPause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none;width:clamp(22px,3vmin,34px);height:clamp(22px,3vmin,34px);">
        <rect x="5" y="3" width="5" height="18" rx="1.5"/><rect x="14" y="3" width="5" height="18" rx="1.5"/>
      </svg>
    </button>
    <button class="btn btn-secondary" id="btnSkip" title="다음" aria-label="다음">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:clamp(18px,2.5vmin,26px);height:clamp(18px,2.5vmin,26px);">
        <polygon points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>
  </div>

  <button class="settings-toggle" id="btnSettings" aria-label="시간 설정">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <span id="settingsLabel">시간 설정</span>
  </button>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-row">
      <span class="settings-label" id="lblWork">🍅 작업</span>
      <div class="time-input-group">
        <input type="number" class="time-input" id="workMin" value="50" min="1" max="120" aria-label="작업 분">
        <span class="time-sep" id="sepWorkMin">분</span>
        <input type="number" class="time-input" id="workSec" value="0" min="0" max="59" aria-label="작업 초">
        <span class="time-sep" id="sepWorkSec">초</span>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label" id="lblRest">☁️ 휴식</span>
      <div class="time-input-group">
        <input type="number" class="time-input" id="restMin" value="10" min="1" max="60" aria-label="휴식 분">
        <span class="time-sep" id="sepRestMin">분</span>
        <input type="number" class="time-input" id="restSec" value="0" min="0" max="59" aria-label="휴식 초">
        <span class="time-sep" id="sepRestSec">초</span>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label" id="lblSessions">🔵 세션</span>
      <div class="time-input-group">
        <input type="number" class="time-input" id="maxSessions" value="4" min="1" max="12" aria-label="세션 수" style="width:64px">
        <span class="time-sep" id="sepSessions">회</span>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label" id="lblSound">🔔 소리</span>
      <select class="sound-select" id="soundSelect"></select>
    </div>
    <button class="btn-apply" id="btnNotif" style="display:none;">알림 켜기</button>
    <button class="btn-apply" id="btnApply">적용</button>
  </div>

  <div class="session-counter" id="sessionCounter"></div>
</div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 110;

  const $ = (s) => document.querySelector(s);
  const ringProgress = $('#ringProgress');
  const timerText = $('#timerText');
  const statusLabel = $('#statusLabel');
  const mascot = $('#mascot');
  const btnPlay = $('#btnPlay');
  const btnReset = $('#btnReset');
  const btnSkip = $('#btnSkip');
  const iconPlay = $('#iconPlay');
  const iconPause = $('#iconPause');
  const settingsPanel = $('#settingsPanel');
  const sessionCounter = $('#sessionCounter');

  ringProgress.style.strokeDasharray = CIRCUMFERENCE;
  ringProgress.style.strokeDashoffset = '0';

  // ── i18n ──
  const i18n = {
    ko: {

      mascotWork: '🐣', mascotRest: '😴',
      lblSound: '🔔 소리', btnSettings: '⚙️ 시간 설정',
      titleReset: '리셋', titlePlay: '시작', titlePause: '일시정지', titleSkip: '다음',
      notifBtn: '🔔 알림 켜기', notifOn: '🔔 알림 켜짐 ✅',
      notifDenied: '🚫 알림 차단됨',

      notifDenied: '🚫 Notifications blocked',

      ariaSessions: 'Number of sessions',
    },
    zh: {
      title: '🍅 专注时间', titleRest: '☁️ 休息时间',
      settings: '时间设置', settingsRest: '时间设置',
      lblWork: '🍅 工作', lblRest: '☁️ 休息', lblSessions: '🔵 轮次',
      sepMin: '分', sepSec: '秒', sepSessions: '次',
      btnApply: '应用',
      alertMin: '请至少设置 1 分钟！',
      notifWorkTitle: '工作完成！', notifWorkBody: '休息一下吧~ ☁️',
      notifRestTitle: '休息结束！', notifRestBody: '继续专注吧~ 🍅',
      docTitleWork: '{time} Pomomo🍅', docTitleRest: '{time} Pomomo🍅',
      mascotWork: '🐣', mascotRest: '😴',
      lblSound: '🔔 提示音', btnSettings: '⚙️ 设置',
      titleReset: '重置', titlePlay: '开始', titlePause: '暂停', titleSkip: '跳过',
      notifBtn: '🔔 开启通知', notifOn: '🔔 通知已开启 ✅',
      notifDenied: '🚫 通知已阻止',
      ariaWorkMin: '工作分钟', ariaWorkSec: '工作秒',
      ariaRestMin: '休息分钟', ariaRestSec: '休息秒',
      ariaSessions: '轮次数',
    },
  };

  let lang = localStorage.getItem('pomo-lang') || 'ko';

  function t(key) { return i18n[lang][key] || key; }

  function applyLanguage() {
    document.documentElement.lang = lang;
    // 언어 버튼
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    // 라벨 업데이트
    $('#settingsLabel').textContent = t('settings');
    btnSettings.setAttribute('aria-label', t('btnSettings'));
    $('#lblWork').textContent = t('lblWork');
    $('#lblRest').textContent = t('lblRest');
    $('#lblSessions').textContent = t('lblSessions');
    $('#lblSound').textContent = t('lblSound');
    $('#sepWorkMin').textContent = t('sepMin');
    $('#sepWorkSec').textContent = t('sepSec');
    $('#sepRestMin').textContent = t('sepMin');
    $('#sepRestSec').textContent = t('sepSec');
    $('#sepSessions').textContent = t('sepSessions');
    $('#btnApply').textContent = t('btnApply');
    // 버튼 title/aria-label
    btnReset.title = t('titleReset');
    btnReset.setAttribute('aria-label', t('titleReset'));
    btnPlay.title = state.isRunning ? t('titlePause') : t('titlePlay');
    btnPlay.setAttribute('aria-label', btnPlay.title);
    btnSkip.title = t('titleSkip');
    btnSkip.setAttribute('aria-label', t('titleSkip'));
    // 알림 버튼
    updateNotifBtn();
    // 입력 필드 aria-label
    $('#workMin').setAttribute('aria-label', t('ariaWorkMin'));
    $('#workSec').setAttribute('aria-label', t('ariaWorkSec'));
    $('#restMin').setAttribute('aria-label', t('ariaRestMin'));
    $('#restSec').setAttribute('aria-label', t('ariaRestSec'));
    $('#maxSessions').setAttribute('aria-label', t('ariaSessions'));
    populateSoundSelect();
    // UI 갱신
    setUIForMode();
    updateDocTitle();
  }

  // ── 상태 ──
  let state = {
    workDuration: 50 * 60,
    restDuration: 10 * 60,
    remaining: 50 * 60,
    total: 50 * 60,
    isRunning: false,
    isWork: true,
    sessionsCompleted: 0,
    maxSessions: 4,
  };

  let intervalId = null;
  let endTime = null;

  // ── UI 업데이트 ──
  function updateRing(frac) {
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - frac);
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }

  function updateDocTitle() {
    const key = state.isWork ? 'docTitleWork' : 'docTitleRest';
    document.title = t(key).replace('{time}', formatTime(state.remaining));
  }

  function setUIForMode() {
    if (state.isWork) {
      statusLabel.textContent = t('title');
      statusLabel.className = 'status-label work';
      timerText.className = 'timer-text work';
      ringProgress.classList.remove('rest-mode');
      btnPlay.classList.remove('rest-mode');
      mascot.textContent = t('mascotWork');
      mascot.className = state.isRunning ? 'mascot working' : 'mascot';
    } else {
      statusLabel.textContent = t('titleRest');
      statusLabel.className = 'status-label rest';
      timerText.className = 'timer-text rest';
      ringProgress.classList.add('rest-mode');
      btnPlay.classList.add('rest-mode');
      mascot.textContent = t('mascotRest');
      mascot.className = 'mascot';
    }
  }

  function refreshAll() {
    timerText.textContent = formatTime(state.remaining);
    updateRing(state.remaining / state.total);
    setUIForMode();
    updateDots();
    updateButtons();
    updateDocTitle();
  }

  function updateButtons() {
    const hasElapsed = state.remaining !== state.total;
    btnReset.disabled = !hasElapsed && !state.isRunning;
    btnSkip.disabled = false;

    if (state.isRunning) {
      iconPlay.style.display = 'none';
      iconPause.style.display = '';
      btnPlay.title = t('titlePause');
      btnPlay.setAttribute('aria-label', t('titlePause'));
    } else {
      iconPlay.style.display = '';
      iconPause.style.display = 'none';
      btnPlay.title = t('titlePlay');
      btnPlay.setAttribute('aria-label', t('titlePlay'));
    }
  }

  function updateDots() {
    sessionCounter.innerHTML = '';
    for (let i = 0; i < state.maxSessions; i++) {
      const dot = document.createElement('div');
      dot.className = 'session-dot';
      if (i < state.sessionsCompleted) dot.classList.add('done');
      sessionCounter.appendChild(dot);
    }
  }

  // ── 타이머 로직 ──
  function tick() {
    if (!state.isRunning || !endTime) return;
    const now = Date.now();
    state.remaining = Math.max(0, Math.round((endTime - now) / 1000));
    refreshAll();
    if (state.remaining <= 0) {
      completeSession();
    }
  }

  function startTimer() {
    if (state.remaining <= 0) return;
    state.isRunning = true;
    endTime = Date.now() + state.remaining * 1000;
    intervalId = setInterval(tick, 200);
    mascot.className = 'mascot working';
    updateButtons();
  }

  function pauseTimer() {
    state.isRunning = false;
    clearInterval(intervalId);
    intervalId = null;
    if (endTime) {
      state.remaining = Math.max(0, Math.round((endTime - Date.now()) / 1000));
    }
    endTime = null;
    mascot.className = 'mascot';
    updateButtons();
  }

  function resetTimer() {
    state.isRunning = false;
    clearInterval(intervalId);
    intervalId = null;
    endTime = null;
    state.remaining = state.isWork ? state.workDuration : state.restDuration;
    state.total = state.remaining;
    mascot.className = 'mascot';
    refreshAll();
  }

  function skipSession() {
    state.isRunning = false;
    clearInterval(intervalId);
    intervalId = null;
    endTime = null;
    state.remaining = 0;
    refreshAll();
    completeSession();
  }

  function completeSession() {
    state.isRunning = false;
    clearInterval(intervalId);
    intervalId = null;
    endTime = null;

    if (state.isWork) {
      state.sessionsCompleted = Math.min(state.sessionsCompleted + 1, state.maxSessions);
      state.isWork = false;
      state.remaining = state.restDuration;
      state.total = state.restDuration;
      spawnParticles('🎉');
      showNotification(t('notifWorkTitle'), t('notifWorkBody'));
    } else {
      state.isWork = true;
      state.remaining = state.workDuration;
      state.total = state.workDuration;
      if (state.sessionsCompleted >= state.maxSessions) state.sessionsCompleted = 0;
      spawnParticles('🌸');
      showNotification(t('notifRestTitle'), t('notifRestBody'));
    }

    mascot.className = 'mascot';
    refreshAll();
  }

  // ── 파티클 효과 ──
  function spawnParticles(emoji) {
    const count = 12;
    const container = document.querySelector('.container');
    const rect = container.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    for (let i = 0; i < count; i++) {
      const p = document.createElement('span');
      p.className = 'particle';
      p.textContent = emoji;
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.animation = `particle-up ${1 + Math.random() * 0.6}s ease-out forwards`;
      p.style.animationDelay = Math.random() * 0.25 + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }

  // ── 알림 소리 ──
  const soundNames = {
    beep:    { ko:'기본 삑',   en:'Basic Beep',   zh:'基础提示' },
    chirp:   { ko:'새소리',    en:'Chirp',        zh:'鸟鸣' },
    chime:   { ko:'윈드차임',  en:'Wind Chime',   zh:'风铃' },
    dingdong:{ ko:'딩동',      en:'Ding Dong',    zh:'叮咚' },
    retro:   { ko:'레트로',    en:'Retro',        zh:'复古' },
    piano:   { ko:'피아노',    en:'Piano',        zh:'钢琴' },
    soft:    { ko:'부드럽게',  en:'Soft',         zh:'柔和' },
    cheer:   { ko:'경쾌 알람', en:'Cheerful',     zh:'轻快闹铃' },
    robot:   { ko:'로봇',      en:'Robot',        zh:'机器人' },
    giggle:  { ko:'까르르',    en:'Giggle',       zh:'咯咯笑' },
  };

  const soundPlayers = {
    beep: () => { const c=new AudioContext(); const o=c.createOscillator(); const g=c.createGain(); o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);o.start();o.stop(c.currentTime+.5);const o2=c.createOscillator();const g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.frequency.value=1320;o2.type='sine';g2.gain.setValueAtTime(.2,c.currentTime+.15);g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+.65);o2.start(c.currentTime+.15);o2.stop(c.currentTime+.65); },
    chirp: () => { const c=new AudioContext();[800,1100,1400,1700,2000].forEach((f,i)=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';const t=c.currentTime+i*.07;g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.12);}); },
    chime: () => { const c=new AudioContext();[523,659,784].forEach((f,i)=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';const t=c.currentTime+i*.25;g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o.start(t);o.stop(t+.6);}); },
    dingdong: () => { const c=new AudioContext();[800,640].forEach((f,i)=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f*i===0?800:640;o.type='sine';const t=c.currentTime+i*.18;g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);}); },
    retro: () => { const c=new AudioContext();[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='square';const t=c.currentTime+i*.1;g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.start(t);o.stop(t+.1);}); },
    piano: () => { const c=new AudioContext();[523,659,784].forEach(f=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.7);o.start();o.stop(c.currentTime+.7);}); },
    soft: () => { const c=new AudioContext();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=660;o.type='sine';g.gain.setValueAtTime(.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.8);o.start();o.stop(c.currentTime+.8); },
    cheer: () => { const c=new AudioContext();[660,784,880,1047,880,1047].forEach((f,i)=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';const t=c.currentTime+i*.08;g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.start(t);o.stop(t+.1);}); },
    robot: () => { const c=new AudioContext();[200,300,200,400,200].forEach((f,i)=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sawtooth';const t=c.currentTime+i*.12;g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.12);}); },
    giggle: () => { const c=new AudioContext();[600,720,840,960,600,720].forEach((f,i)=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';const t=c.currentTime+i*.05;g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08);}); },
  };

  let selectedSound = localStorage.getItem('pomo-sound') || 'beep';

  function populateSoundSelect() {
    const sel = $('#soundSelect');
    sel.innerHTML = '';
    Object.keys(soundNames).forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = soundNames[key][lang];
      if (key === selectedSound) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function playSound() {
    try { (soundPlayers[selectedSound] || soundPlayers.beep)(); }
    catch(e) { /* 조용히 실패 */ }
  }

  function showNotification(title, body) {
    playSound();
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body, icon: '🍅' });
    }
  }

  // ── 설정 ──
  function applySettings() {
    const wm = parseInt($('#workMin').value) || 0;
    const ws = parseInt($('#workSec').value) || 0;
    const rm = parseInt($('#restMin').value) || 0;
    const rs = parseInt($('#restSec').value) || 0;
    const ms = parseInt($('#maxSessions').value) || 4;

    const wd = wm * 60 + ws;
    const rd = rm * 60 + rs;

    if (wd < 60 || rd < 60) {
      alert(t('alertMin'));
      return;
    }

    state.workDuration = wd;
    state.restDuration = rd;
    state.maxSessions = Math.max(1, Math.min(12, ms));
    state.sessionsCompleted = 0;

    if (!state.isRunning) {
      state.remaining = state.isWork ? state.workDuration : state.restDuration;
      state.total = state.remaining;
    }

    settingsPanel.classList.remove('open');
    setPanelTabIndex(false);
    refreshAll();
  }

  function syncInputs() {
    $('#workMin').value = Math.floor(state.workDuration / 60);
    $('#workSec').value = state.workDuration % 60;
    $('#restMin').value = Math.floor(state.restDuration / 60);
    $('#restSec').value = state.restDuration % 60;
    $('#maxSessions').value = state.maxSessions;
  }

  // ── 탭 순서 관리 ──
  function setPanelTabIndex(open) {
    const val = open ? '0' : '-1';
    settingsPanel.querySelectorAll('input, select, button').forEach(el => {
      el.setAttribute('tabindex', val);
    });
  }

  // ── 이벤트 ──
  btnPlay.addEventListener('click', () => {
    if (state.isRunning) pauseTimer();
    else startTimer();
  });

  btnReset.addEventListener('click', resetTimer);
  btnSkip.addEventListener('click', skipSession);

  $('#btnSettings').addEventListener('click', () => {
    syncInputs();
    const isOpen = settingsPanel.classList.toggle('open');
    setPanelTabIndex(isOpen);
  });

  $('#btnApply').addEventListener('click', applySettings);

  // 언어 전환
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      lang = btn.dataset.lang;
      localStorage.setItem('pomo-lang', lang);
      applyLanguage();
    });
  });

  // 키보드 단축키
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') {
      e.preventDefault();
      if (state.isRunning) pauseTimer();
      else startTimer();
    }
    if (e.code === 'KeyR' && !e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      resetTimer();
    }
  });

  // 알림 권한 버튼
  function updateNotifBtn() {
    const btn = $('#btnNotif');
    if (!('Notification' in window)) {
      btn.style.display = 'none';
      return;
    }
    if (Notification.permission === 'granted') {
      btn.textContent = t('notifOn');
      btn.style.display = 'inline-block';
      btn.disabled = true;
      btn.style.opacity = '0.6';
    } else if (Notification.permission === 'denied') {
      btn.textContent = t('notifDenied');
      btn.style.display = 'inline-block';
      btn.disabled = true;
      btn.style.opacity = '0.6';
    } else {
      btn.textContent = t('notifBtn');
      btn.style.display = 'inline-block';
      btn.disabled = false;
      btn.style.opacity = '1';
    }
  }

  $('#btnNotif').addEventListener('click', () => {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission().then(() => updateNotifBtn());
    }
  });

  // 사운드 선택
  $('#soundSelect').addEventListener('change', () => {
    selectedSound = $('#soundSelect').value;
    localStorage.setItem('pomo-sound', selectedSound);
    playSound(); // 미리듣기
  });

  // 초기 렌더
  applyLanguage();
  refreshAll();
  syncInputs();
  populateSoundSelect();
  setPanelTabIndex(false);
</script>
</body>
</html>
